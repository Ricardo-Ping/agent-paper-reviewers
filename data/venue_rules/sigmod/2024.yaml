schema_version: 1
venue: sigmod
year: 2024
display_name: SIGMOD
profile:
  scoring_axes:
  - novelty
  - soundness
  - experiment
  - clarity
  weights:
    novelty: 0.22
    soundness: 0.33
    experiment: 0.3
    clarity: 0.15
  common_reject_reasons:
  - Contribution novelty over prior database systems is not sufficiently clear.
  - Experimental evaluation lacks scale, workload diversity, or strong baselines.
  - Reproducibility details for system implementation and configuration are incomplete.
  required_checks:
  - baseline_coverage
  - statistical_significance
  - ablation_completeness
  - reproducibility_details
  - practical_impact
  rebuttal_policy:
    mode: per_review_only
    per_review_char_limit: 2500
    global_char_limit: 0
    allow_attachment_pdf: false
    attachment_page_limit: 0
    allow_links: false
    dynamic_from_openreview: false
  openreview_group_id: ''
  version_date: '2026-03-25'
