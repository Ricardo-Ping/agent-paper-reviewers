schema_version: 1
venue: acl-arr
year: 2026
display_name: ACL-ARR
profile:
  scoring_axes:
  - novelty
  - soundness
  - experiment
  - clarity
  weights:
    novelty: 0.2
    soundness: 0.3
    experiment: 0.3
    clarity: 0.2
  common_reject_reasons:
  - Significance and impact are not convincingly demonstrated.
  - Experimental design lacks strong or task-appropriate baselines.
  - Error analysis and limitations are underdeveloped.
  required_checks:
  - baseline_coverage
  - statistical_significance
  - ablation_completeness
  - qualitative_analysis
  - limitations
  rebuttal_policy:
    mode: per_review_only
    per_review_char_limit: 2500
    global_char_limit: 0
    allow_attachment_pdf: false
    attachment_page_limit: 0
    allow_links: false
    dynamic_from_openreview: true
  decision_policy:
    strictness_tier: high_competition
    p0_not_ready: true
    p1_not_ready_threshold: 2
    p1_borderline_threshold: 1
    min_overall_ready: 6.8
    min_overall_borderline: 5.9
    notes: ARR competition remains high; Borderline means major risk before target ACL-family venue.
  openreview_group_id: aclweb.org/ACL/ARR/2026
  version_date: '2026-03-25'
