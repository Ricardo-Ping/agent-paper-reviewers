schema_version: 1
venue: eccv
year: 2026
display_name: ECCV
profile:
  scoring_axes:
  - novelty
  - soundness
  - experiment
  - clarity
  weights:
    novelty: 0.25
    soundness: 0.3
    experiment: 0.3
    clarity: 0.15
  common_reject_reasons:
  - Contribution type and claimed novelty are not tightly aligned.
  - Evaluation lacks breadth or fails to verify key assumptions.
  - Paper clarity does not meet camera-ready expectations.
  required_checks:
  - baseline_coverage
  - ablation_completeness
  - significance_reporting
  - reproducibility_details
  - contribution_alignment
  rebuttal_policy:
    mode: per_review_only
    per_review_char_limit: 2500
    global_char_limit: 0
    allow_attachment_pdf: false
    attachment_page_limit: 0
    allow_links: false
    dynamic_from_openreview: true
  decision_policy:
    strictness_tier: high_competition
    p0_not_ready: true
    p1_not_ready_threshold: 2
    p1_borderline_threshold: 1
    min_overall_ready: 7.0
    min_overall_borderline: 6.0
    notes: Borderline is treated as near-reject risk for highly competitive AI/CV venues.
  openreview_group_id: ecva.net/ECCV/2026/Conference
  version_date: '2026-03-25'
