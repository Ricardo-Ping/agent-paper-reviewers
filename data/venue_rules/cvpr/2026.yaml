schema_version: 1
venue: cvpr
year: 2026
display_name: CVPR
profile:
  scoring_axes:
  - novelty
  - soundness
  - experiment
  - clarity
  weights:
    novelty: 0.25
    soundness: 0.3
    experiment: 0.3
    clarity: 0.15
  common_reject_reasons:
  - Insufficient comparison against strong visual baselines.
  - Ablation and qualitative analysis fail to explain model behavior.
  - Claims of robustness/generalization are under-supported.
  required_checks:
  - baseline_coverage
  - ablation_completeness
  - qualitative_error_analysis
  - robustness_checks
  - reproducibility_details
  rebuttal_policy:
    mode: per_review_only
    per_review_char_limit: 2500
    global_char_limit: 0
    allow_attachment_pdf: false
    attachment_page_limit: 0
    allow_links: false
    dynamic_from_openreview: true
  decision_policy:
    strictness_tier: high_competition
    p0_not_ready: true
    p1_not_ready_threshold: 2
    p1_borderline_threshold: 1
    min_overall_ready: 7.0
    min_overall_borderline: 6.0
    notes: Borderline is treated as near-reject risk for highly competitive AI/CV venues.
  openreview_group_id: thecvf.com/CVPR/2026/Conference
  version_date: '2026-03-25'
