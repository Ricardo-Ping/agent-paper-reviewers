name: EMNLP
default_year: 2025
years:
  "2025":
    scoring_axes: [novelty, soundness, experiment, clarity]
    weights:
      novelty: 0.20
      soundness: 0.30
      experiment: 0.30
      clarity: 0.20
    common_reject_reasons:
      - "The paper does not offer sufficient empirical improvement over prior work."
      - "Ablation and analysis are too shallow to support claims."
      - "Writing clarity and organization hinder reproducibility."
    required_checks:
      - baseline_coverage
      - statistical_significance
      - ablation_completeness
      - error_analysis
      - clarity
    rebuttal_policy:
      mode: per_review_only
      per_review_char_limit: 2500
      global_char_limit: 0
      allow_attachment_pdf: false
      attachment_page_limit: 0
      allow_links: false
      dynamic_from_openreview: true
    openreview_group_id: "EMNLP.org/2025/Conference"
    version_date: "2026-03-25"
